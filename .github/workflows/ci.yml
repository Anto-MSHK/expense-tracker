name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

  e2e:
    name: E2E (offline-first)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: expense
          POSTGRES_PASSWORD: expense
          POSTGRES_DB: expense_tracker
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U expense -d expense_tracker"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgresql://expense:expense@localhost:5432/expense_tracker
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright (chromium)
        run: pnpm --filter @expense/web exec playwright install --with-deps chromium
      - name: Применить миграции
        run: pnpm --filter @expense/api db:migrate
      - name: Сборка
        run: pnpm build
      - name: Запустить API и дождаться готовности
        env:
          API_PORT: "3001"
          CORS_ORIGIN: http://localhost:4173
        run: |
          node apps/api/dist/index.js &
          for i in $(seq 1 30); do curl -sf http://localhost:3001/health && break; sleep 1; done
      - name: E2E
        run: pnpm --filter @expense/web test:e2e
      - uses: actions/upload-artifact@v4
        if: ${{ failure() }}
        with:
          name: playwright-report
          path: apps/web/playwright-report
          retention-days: 7
