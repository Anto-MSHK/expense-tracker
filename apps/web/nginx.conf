server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Проксируем API: /api/expenses -> http://api:3001/expenses (префикс /api срезается)
  location /api/ {
    proxy_pass http://api:3001/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  # Service worker не кешируем — чтобы обновления подхватывались сразу
  location = /sw.js {
    add_header Cache-Control "no-cache";
    try_files $uri =404;
  }

  # SPA-fallback
  location / {
    try_files $uri $uri/ /index.html;
  }
}
